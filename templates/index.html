<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ESP32 频谱分析</title>
    <script src="https://cdn.staticfile.net/echarts/5.4.3/echarts.min.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; padding: 20px; }
        h2 { text-align: center; color: #333; }
        .container { display: flex; gap: 20px; }
        .box { flex: 1; height: 450px; background: #fff; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); padding: 10px; }
    </style>
</head>
<body>
    <h2>自适应语音降噪与频谱分析系统</h2>
    <div class="container">
        <div id="rawChart" class="box"></div>
        <div id="processedChart" class="box"></div>
    </div>

    <script>
        // 1. 初始化图表
        var rawChart = echarts.init(document.getElementById('rawChart'));
        var processedChart = echarts.init(document.getElementById('processedChart'));

        // 2. 基础配置模板
        function getOpt(title, color) {
            return {
                title: { text: title, left: 'center' },
                tooltip: { trigger: 'axis' },
                xAxis: { type: 'category', name: 'Hz' },
                yAxis: { type: 'value', name: '振幅' },
                series: [{ data: [], type: 'line', itemStyle: { color: color }, symbol: 'none' }]
            };
        }

        rawChart.setOption(getOpt('降噪前 (原始环境音)', '#ff4d4f'));
        processedChart.setOption(getOpt('降噪后 (纯净人声)', '#52c41a'));

        // 3. 每 2 秒拉取一次 Django 的数据
        setInterval(() => {
            // 使用相对路径，无论你 IP 是多少都不会错
            fetch('/api/get_audio_data/')
                .then(res => res.json())
                .then(data => {
                    if(data.raw.fft_freq.length > 0) {
                        rawChart.setOption({ xAxis: { data: data.raw.fft_freq }, series: [{ data: data.raw.fft_mag }] });
                    }
                    if(data.processed.fft_freq.length > 0) {
                        processedChart.setOption({ xAxis: { data: data.processed.fft_freq }, series: [{ data: data.processed.fft_mag }] });
                    }
                })
                .catch(err => console.log("正在等待单片机上传数据..."));
        }, 2000);
    </script>
</body>
</html>
